name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore proxy-uid.sln

      - name: Build Release
        run: msbuild proxy-uid.sln /p:Configuration=Release /v:minimal /nologo

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: tryhard-exe
          path: |
            bin/Release/*.exe
            bin/Release/**/*.exe
          if-no-files-found: error

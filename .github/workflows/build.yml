name: build

on:
  push:
    branches: [main, master, exe-build]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build EXE (config + Run-Build-Exe.bat)
        shell: cmd
        run: scripts\Run-Build-Exe.bat

      - name: Show bin output
        shell: cmd
        run: |
          echo === bin\Release ===
          dir bin\Release\*.exe 2>nul || echo (empty)
          echo === bin\Debug ===
          dir bin\Debug\*.exe 2>nul || echo (empty)

      - name: Upload real EXE from bin
        uses: actions/upload-artifact@v4
        with:
          name: tryhard-exe
          path: |
            bin/Release/*.exe
            bin/Debug/*.exe
          if-no-files-found: error

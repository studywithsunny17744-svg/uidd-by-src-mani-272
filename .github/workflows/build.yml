name: build

on:
  push:
    branches: [main, master, exe-build]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: nuget/setup-nuget@v2

      - uses: microsoft/setup-msbuild@v2

      - name: Apply branding.config
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/Apply-Branding.ps1 -Root .

      - name: Clean old bin (purani default EXE hatao)
        shell: cmd
        run: if exist bin rmdir /s /q bin

      - name: Restore NuGet packages
        run: nuget restore proxy-uid.sln -NonInteractive

      - name: Build Release
        run: msbuild proxy-uid.sln /p:Configuration=Release /v:minimal /nologo /restore

      - name: List bin EXE
        shell: cmd
        run: dir /s /b bin\*.exe

      - name: Upload EXE from bin
        uses: actions/upload-artifact@v4
        with:
          name: tryhard-exe
          path: |
            bin/Release/*.exe
            bin/Debug/*.exe
          if-no-files-found: error
